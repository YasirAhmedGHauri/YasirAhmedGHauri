    <filter id="blur"><feGaussianBlur stdDeviation="55"/></filter>
    <filter id="softGlow"><feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#00E6A8" flood-opacity="0.45"/></filter>
    <filter id="cardShadow"><feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#00E6A8" flood-opacity="0.16"/></filter>
    <clipPath id="clip"><rect width="1600" height="520" rx="38"/></clipPath>
