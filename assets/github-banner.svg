<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="520">
      <stop offset="0%" stop-color="#020403"/>
      <stop offset="38%" stop-color="#052018"/>
      <stop offset="70%" stop-color="#03100C"/>
      <stop offset="100%" stop-color="#020202"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="50%" cy="50%" r="50%">
